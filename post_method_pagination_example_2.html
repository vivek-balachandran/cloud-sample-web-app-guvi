<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POST Method Pagination</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .post-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-left: 5px solid #2563eb; }
        .pagination { margin-top: 20px; display: flex; gap: 10px; align-items: center; }
        button { padding: 10px; cursor: pointer; }
        .payload-note { font-size: 0.8rem; color: #666; background: #eee; padding: 5px; }
    </style>
</head>
<body>

    <h2>POST Request Data Fetcher</h2>
    <div id="app">
        <div id="results"></div>
        
        <div class="pagination">
            <button onclick="fetchWithPost(currentPage - 1)" id="prevBtn">Previous</button>
            <span>Page: <strong id="pageDisplay">1</strong></span>
            <button onclick="fetchWithPost(currentPage + 1)" id="nextBtn">Next</button>
        </div>
    </div>

<script>
    let currentPage = 1;
    const limit = 1; // Since POST returns 1 created object on this API

    async function fetchWithPost(page) {
        if (page < 1) return;
        
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "<em>Sending POST request...</em>";

        try {
            // Following the request body types for a POST creation/filter
            const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                method: 'POST',
                headers: { 'Content-type': 'application/json; charset=UTF-8' },
                body: JSON.stringify({
                    title: `Requesting Page ${page}`,
                    body: `This content was fetched via POST method at ${new Date().toLocaleTimeString()}`,
                    userId: 1,
                    requestedPage: page // Custom property in payload
                }),
            });

            const postData = await response.json();
            currentPage = page;
            render(postData);
        } catch (err) {
            resultsDiv.innerHTML = "Error fetching via POST.";
        }
    }

    function render(data) {
        const resultsDiv = document.getElementById('results');
        document.getElementById('pageDisplay').innerText = currentPage;
        
        // Rendering the exact object returned by the POST request
        resultsDiv.innerHTML = `
            <div class="post-card">
                <div class="payload-note">Server Response ID: ${data.id}</div>
                <h3>${data.title}</h3>
                <p>${data.body}</p>
                <p><strong>Meta:</strong> Simulated fetch for page ${data.requestedPage}</p>
            </div>
        `;
        
        // Simple toggle for the prev button
        document.getElementById('prevBtn').disabled = currentPage === 1;
    }

    // Initial call
    fetchWithPost(1);
</script>
</body>
</html>
